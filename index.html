<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png">
    <link rel="manifest" href="/site.webmanifest">
     <style>
        html, body {
            margin: 0; 
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; 
            overscroll-behavior: none; 
        }

        body { 
            height: 100vh; 
            display: flex; 
            justify-content: center;  
            align-items: center; 
            font-size: 5rem; 
            font-weight: bold; 
            font-family: 'Orbitron';
            color: white; 
            position: fixed;
        } 
        canvas { display: block; vertical-align: bottom; } 

        #particles-js { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: linear-gradient(to bottom, #070716, #151535); 
            z-index: 1; 
        } 
       
        .main-text {
            z-index: 2; 
            position: absolute;
            cursor: pointer; 
            user-select: none;             
            transition: transform 0.2s ease;
        } 

        .main-text:hover {
            transform: scale(0.95);
            opacity: 0.9;
        }

        .main-text:active {
            transform: scale(0.90);
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="main-text" onclick="playMeow()">にゃｒ</div>

    <script src="js/particles.min.js"></script>
    <script src="particles-config.js"></script>

    <script>
        const meowAudio = new Audio('sound/meow.mp3');
        meowAudio.volume = 0.3; 

        function playMeow() {
            meowAudio.currentTime = 0; 
            meowAudio.play().catch(error => {
                console.log("再生エラー：", error);
            });
        }
    </script>
</body>
</html>
